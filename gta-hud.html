  :root{
    --scale: 1;
    --time-top: #cfe8ff;
    --time-bottom: #7fbfff;
    --money-top: #b6ff7a;
    --money-bottom: #28a428;
    --heart: #ff3d9a;
    --health-top: #ffd1ea;
    --health-bottom: #ff6fb5;
    --star-top: #175387;     /* закрашенная звезда */
    --star-fill: #175387;
    --star-empty: #4EADF1;   /* пустая звезда */
    --star-line: #000;
    --frame: #ff5bb0;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%; height:100%;
    background: transparent;       /* прозрачный фон для оверлея */
    overflow:hidden;
    font-family:'Pricedown', Impact, 'Arial Narrow', sans-serif;
  }

  /* фон-превью только когда включён режим настройки */
  body.preview{
    background:
      linear-gradient(180deg,#1e6fb0 0%, #4aa3e0 60%, #79c4f0 100%);
  }

  #hud{
    position:fixed;
    top: calc(18px * var(--scale));
    right: calc(24px * var(--scale));
    display:flex;
    align-items:flex-start;
    gap: calc(14px * var(--scale));
    flex-direction: row-reverse;     /* аватар справа */
    transform-origin: top right;
    user-select:none;
  }

  .stats{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap: calc(0.5px * var(--scale));
  }

  /* общий стиль текста HUD под Pricedown (как в GTA SA) */
  .pix{
    line-height:.9;
    letter-spacing: calc(1px * var(--scale));
    -webkit-text-stroke: calc(1.5px * var(--scale)) var(--star-line);
    paint-order: stroke fill;
    /* мягкая «подложка»-тень как в игре + чёткий нижний контур */
    text-shadow:
      calc(3px * var(--scale)) calc(3px * var(--scale)) 0 rgba(0,0,0,.6),
      0 calc(2px * var(--scale)) calc(3px * var(--scale)) rgba(0,0,0,.35);
  }

  .time{
    font-size: calc(52px * var(--scale));
    color:#50ADF0;
    background:none;
    -webkit-text-fill-color:#50ADF0;
    text-shadow:
      calc(3px * var(--scale)) calc(3px * var(--scale)) 0 #000,
      0 calc(2px * var(--scale)) calc(3px * var(--scale)) #000;
  }
  .money{
    font-size: calc(50px * var(--scale));
    margin-top: calc(1px * var(--scale));
    color:#03AB70;
    background:none;
    -webkit-text-fill-color:#03AB70;
    text-shadow:
      calc(3px * var(--scale)) calc(3px * var(--scale)) 0 #000,
      0 calc(2px * var(--scale)) calc(3px * var(--scale)) #000;
  }
  .earned{
    font-size: calc(34px * var(--scale));
    color:#2EE08A;
    background:none;
    -webkit-text-fill-color:#2EE08A;
    -webkit-text-stroke: calc(1px * var(--scale)) var(--star-line);
    text-shadow:
      calc(2px * var(--scale)) calc(2px * var(--scale)) 0 #000,
      0 calc(2px * var(--scale)) calc(3px * var(--scale)) #000;
  }
  .sep{
    font-size: calc(34px * var(--scale));
    color:#e8e8ea;
    -webkit-text-fill-color:#e8e8ea;
    -webkit-text-stroke: calc(1px * var(--scale)) var(--star-line);
    text-shadow: calc(2px * var(--scale)) calc(2px * var(--scale)) 0 #000;
    margin: 0 calc(2px * var(--scale));
  }
  .health-row{
    display:flex; align-items:center; gap: calc(8px * var(--scale));
    margin-top: calc(1px * var(--scale));
  }
  .heart{
    font-size: calc(40px * var(--scale));
    line-height:1;
    display:inline-block;
    transform: scaleX(1.6);
    transform-origin:center;
    margin-right: calc(7px * var(--scale));
    color:#EC95CA;
    -webkit-text-stroke: calc(1px * var(--scale)) var(--star-line);
    text-shadow: calc(3px * var(--scale)) calc(3px * var(--scale)) 0 rgba(0,0,0,.6);
  }
  .health{
    font-size: calc(46px * var(--scale));
    color:#EC95CA;
    background:none;
    -webkit-text-fill-color:#EC95CA;
    text-shadow:
      calc(3px * var(--scale)) calc(3px * var(--scale)) 0 #000,
      0 calc(2px * var(--scale)) calc(3px * var(--scale)) #000;
  }

  .stars{ display:flex; gap: calc(4px * var(--scale)); margin-top: calc(2px * var(--scale)); }
  .star{ width: calc(34px * var(--scale)); height: calc(34px * var(--scale)); display:block; }
  .star svg{ width:100%; height:100%; display:block; }

  /* аватар */
  .avatar{
    width: calc(96px * var(--scale));
    height: calc(96px * var(--scale));
    border-radius: calc(22px * var(--scale));
    border: calc(5px * var(--scale)) solid var(--frame);
    box-shadow:
      0 0 calc(10px*var(--scale)) var(--frame),
      inset 0 0 0 calc(3px*var(--scale)) rgba(0,0,0,.4);
    background:
      linear-gradient(150deg,#28e0c8 0%, #6f7bff 45%, #ff2fa0 100%);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-size: calc(40px * var(--scale));
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }

  /* дефолтный кулак из GTA: у картинки уже своя рамка — убираем обёртку */
  .avatar.raw{
    border:none; box-shadow:none; background:none;
    border-radius:0; overflow:visible;
  }
  .avatar.raw img{ object-fit:contain;
    filter: drop-shadow(calc(4px*var(--scale)) calc(4px*var(--scale)) 0 rgba(0,0,0,.45)); }

  /* ===== панель настроек ===== */
  #gear{
    display:none;                /* кнопка скрыта; панель открывается клавишей S */
    position:fixed; bottom:14px; left:14px; z-index:50;
    width:42px; height:42px; border-radius:10px;
    border:1px solid #444; background:#1b1b1ecc; color:#eee;
    font-family:system-ui, sans-serif; font-size:20px; cursor:pointer;
    align-items:center; justify-content:center;
  }
  #gear:hover{ background:#2a2a30; }

  #panel{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:50;
    width:300px; max-height:82vh; overflow:auto;
    background:#16161acc; backdrop-filter:blur(8px);
    border:1px solid #3a3a40; border-radius:14px; padding:16px;
    color:#e8e8ea; font-family:system-ui,-apple-system,sans-serif;
    display:none;
  }
  #panel.open{ display:block; }
  #panel h2{ font-size:14px; letter-spacing:.5px; margin-bottom:12px; color:#fff; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:#aeb0b6; margin-bottom:6px; }
  .field input[type=text],
  .field input[type=number]{
    width:100%; padding:8px 10px; border-radius:8px;
    border:1px solid #3a3a42; background:#0e0e12; color:#fff; font-size:13px;
  }
  .field input[type=range]{ width:100%; }
  .row{ display:flex; gap:8px; align-items:center; }
  .pill{ display:flex; gap:6px; }
  .pill button{
    flex:1; padding:7px 0; border-radius:8px; cursor:pointer; font-size:12px;
    border:1px solid #3a3a42; background:#0e0e12; color:#cfd0d4;
  }
  .pill button.active{ background:#ff5bb0; border-color:#ff5bb0; color:#0b0b0d; font-weight:600; }
  .val{ font-size:12px; color:#8fd; min-width:34px; text-align:right; }
  .hint{ font-size:11px; color:#8a8c92; line-height:1.5; margin-top:4px; }
  #copyBtn{
    width:100%; padding:10px; border-radius:8px; cursor:pointer; font-size:13px;
    border:none; background:#3a86ff; color:#fff; font-weight:600;
  }
  #copyBtn:hover{ background:#2f6fe0; }
  .copied{ font-size:11px; color:#8fd; margin-top:6px; min-height:14px; }
</style>
</head>
<body>

  <div id="hud">
    <div class="avatar raw" id="avatar"></div>
    <div class="stats">
      <div class="pix time" id="time">22:18</div>
      <div class="pix money" id="money">$00060000</div>
      <div class="health-row">
        <span class="heart">♥</span>
        <span class="pix health" id="health">100</span>
        <span class="pix sep">/</span>
        <span class="pix earned" id="earned">+$500</span>
      </div>
      <div class="stars" id="stars"></div>
    </div>
  </div>

  <!-- кнопка-шестерёнка и панель: НЕ видны в записи, если оверлей открыт как Browser Source -->
  <button id="gear" title="Настройки (S)">⚙</button>
  <div id="panel">
    <h2>Настройка</h2>

    <div class="field">
      <label>Деньги ($)</label>
      <input type="number" id="moneyInput" value="60000" min="0">
    </div>

    <div class="field">
      <label>Заработано сегодня (+$)</label>
      <input type="number" id="earnedInput" value="0">
    </div>

    <div class="field">
      <label>Здоровье: <span class="val" id="hpVal">100</span></label>
      <input type="range" id="healthInput" min="0" max="100" value="100">
    </div>

    <div class="field">
      <label>Звёзды розыска: <span class="val" id="starVal">4</span> / 6</label>
      <input type="range" id="starsInput" min="0" max="6" value="4">
    </div>

    <div class="field">
      <button id="copyBtn">Скопировать ссылку для</button>
      <div class="copied" id="copied"></div>
    </div>
  </div>

    stars: clamp(num(params.get('stars'), 4), 0, 6),
    timeMode: params.get('time') && params.get('time') !== 'auto' ? 'manual' : 'auto',

    const m = Math.max(0, state.money).toString().padStart(state.pad, '0');
    $('#money').textContent = '$' + m;

    // заработано сегодня (+сумма) — показываем всегда, в т.ч. 0

  // ---------- часы ----------
  function updateClock(){
    let txt;
    if(state.timeMode === 'manual'){
      txt = state.timeManual || '00:00';
    }else{
      const d = new Date();
      let h = d.getHours();
      const mm = String(d.getMinutes()).padStart(2,'0');
      if(state.fmt === '12'){
        h = h % 12; if(h===0) h = 12;
      }
      txt = String(h).padStart(2,'0') + ':' + mm;
    }
    $('#time').textContent = txt;
  }
  setInterval(updateClock, 1000);

  // ---------- панель ----------
  const panel = $('#panel');
  $('#gear').addEventListener('click', () => togglePanel());
  $('#avatar').addEventListener('click', () => togglePanel());
  document.addEventListener('keydown', e => {
    if(e.key === 's' || e.key === 'ы' || e.key === 'S') togglePanel();
  });
  function togglePanel(){
    const open = panel.classList.toggle('open');
    document.body.classList.toggle('preview', open);   // фон-превью только в настройке
  }

  // инициализация полей из state
  $('#moneyInput').value = state.money;
  $('#earnedInput').value = state.earned;
  $('#healthInput').value = state.health;  $('#hpVal').textContent = state.health;
  $('#starsInput').value = state.stars;    $('#starVal').textContent = state.stars;

  $('#moneyInput').addEventListener('input', e => { state.money = num(e.target.value,0); render(); });
  $('#earnedInput').addEventListener('input', e => { state.earned = num(e.target.value,0); render(); });
  $('#healthInput').addEventListener('input', e => { state.health = +e.target.value; $('#hpVal').textContent = state.health; render(); });
  $('#starsInput').addEventListener('input', e => { state.stars = +e.target.value; $('#starVal').textContent = state.stars; render(); });

  // ---------- копирование ссылки ----------
  $('#copyBtn').addEventListener('click', () => {
    const p = new URLSearchParams();
    p.set('money', state.money);
    if(state.earned) p.set('earned', state.earned);
    p.set('health', state.health);
    p.set('stars', state.stars);
    const url = location.origin + location.pathname + '?' + p.toString();
    navigator.clipboard?.writeText(url).then(
      () => { $('#copied').textContent = 'Скопировано ✓'; },
      () => { $('#copied').textContent = url; }
    );
    setTimeout(()=>{ $('#copied').textContent=''; }, 2500);
  });

  render();
})();
</script>
</body>
</html>
